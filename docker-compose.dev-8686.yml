services:
  fhub-dev-8686:
    build:
      context: .
      dockerfile: Dockerfile
    image: fhub:dev-8686
    container_name: fhub-dev-8686
    restart: unless-stopped

    ports:
      - "8686:8484"

    volumes:
      - fhub_dev_8686_appdata:/appData
      - /volume1/Video/Movies:/movies
      - /volume1/Video/Shows:/shows
      - /volume1/Video:/downloads
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - fhub_dev_8686_net

    environment:
      - TZ=Asia/Ho_Chi_Minh
      - FHUB_APPDATA_DIR=/appData
      - FHUB_DOWNLOADS_DIR=/downloads
      - FHUB_MOVIES_DIR=/movies
      - FHUB_SHOWS_DIR=/shows
      - FHUB_SEGMENTS_PER_DOWNLOAD=16
      - FHUB_MAX_CONCURRENT=4
      - RUST_LOG=fhub=info,tower_http=info
      - FHUB_CONTAINER_NAME=fhub-dev-8686
      - FHUB_UPDATE_IMAGE=ghcr.io/andyict/fhub-aio:latest

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8484/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  fhub_dev_8686_appdata:

networks:
  fhub_dev_8686_net:
    name: fhub_dev_8686_net
