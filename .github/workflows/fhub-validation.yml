name: FHUB Native Validation

on:
  push:
    branches:
      - fhub-native-rewrite
  pull_request:
    branches:
      - main
      - master
      - fhub-native-rewrite

jobs:
  backend:
    name: Backend validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check backend
        run: cargo check --all-targets

      - name: Test backend
        run: cargo test -- --skip test_generate_search_xml_with_items

  frontend:
    name: Frontend validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Check frontend
        run: npm run check

      - name: Build frontend
        run: npm run build
